<body class="page-enter">

<div class="background"></div>

<!-- SIDEBAR COMPONENT -->
<div id="sidebar"></div>

<!-- NAVBAR COMPONENT -->
<div id="navbar"></div>


<div class="country-container">

<div class="country-help-text">
Com o que você pode ajudar?
</div>

<div class="countries">

<a href="features/ireland-housing-form.html" class="country-card country-large main-card">

<img src="images/house.png">

<p>Moradia</p>

</div>


<div class="dev-wrapper">

<img src="images/job.png">

<p>Trabalho</p>

</div>

<div class="dev-label">
Em desenvolvimento
</div>

</div>


<div class="dev-wrapper">

<img src="images/documents.png">

<p>Documentação</p>

<div class="dev-wrapper">

Em desenvolvimento
</div>

</div>

</div>

</div>


<script src="../js/supabase.js"></script>
<script src="../js/components.js"></script>

<script>

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="index.html"
return

}

const name = data.user.user_metadata.name || "Usuário"

document.getElementById("userName").textContent = name

const initial = name.charAt(0).toUpperCase()

document.getElementById("avatar").textContent = initial

}

loadUser()

/* slogan */

setTimeout(()=>{

const slogan = document.querySelector(".home-slogan")

if(slogan){
slogan.textContent = "Irlanda / Oferecer ajuda"
}

},200)

</script>

</body>
</html>
