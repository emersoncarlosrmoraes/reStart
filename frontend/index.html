<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Re(start)</title>
<link rel="stylesheet" href="../css/style.css">

<!-- Biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="index">

<div class="background"></div>

<!-- TOPBAR -->
<div class="nav-left">
    <!-- Logo usando mesma classe das páginas logadas -->
    <div class="logo">
        <img src="images/logo.png" alt="Logo reStart" class="logo-img">
    </div>
</div>

<div class="login-container">
    <h2>Entrar</h2>

    <form id="loginForm">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <p id="errorMsg" style="color:red;"></p>

    <p class="register-link">
        Não tem conta? <a href="register.html">Criar conta</a>
    </p>
</div>

<div class="page-transition"></div>

<script src="../js/supabase.js"></script>

<script>
// background animation
const bg = document.querySelector(".background");
document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 60;
    const y = (window.innerHeight / 2 - e.clientY) / 60;
    bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
});

// LOGIN
const form = document.getElementById("loginForm");
const transition = document.querySelector(".page-transition");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", async function(e){
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (error) {
        errorMsg.textContent = error.message;
        return;
    }

    transition.classList.add("active");
    document.body.classList.add("fade-out");

    setTimeout(()=>{
        window.location.href="home.html";
    },600);
});
</script>

</body>
</html>
