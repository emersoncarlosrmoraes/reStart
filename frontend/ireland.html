<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Re(start) - Irlanda</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="page-enter">

<div class="background"></div>

<!-- SIDEBAR COMPONENT -->
<div id="sidebar"></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- NAVBAR COMPONENT -->
<div id="navbar"></div>

<!-- CONTEÚDO DA PÁGINA -->

<div class="country-page">

<a href="ireland-help.html" class="country-option">

<img src="images/search.png" class="country-page-flag">

<h2>Buscar ajuda</h2>

<p>
Encontre brasileiros que já vivem na Irlanda e podem ajudar
com informações, dicas e apoio no seu recomeço
</p>

</a>


<a href="ireland-offer.html" class="country-option">

<img src="images/help.png" class="country-page-flag">

<h2>Oferecer ajuda</h2>

<p>
Ajude quem está chegando na Irlanda compartilhando sua
experiência e oferecendo orientação
</p>

</a>

</div>


<script src="../js/supabase.js"></script>
<script src="../js/components.js"></script>

<script>

/* background movimento */

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})

/* carregar usuário */

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="index.html"
return

}

const name = data.user.user_metadata.name || "Usuário"

document.getElementById("userName").textContent = name

const initial = name.charAt(0).toUpperCase()

document.getElementById("avatar").textContent = initial

}

loadUser()

/* alterar slogan */

setTimeout(()=>{

const slogan = document.querySelector(".home-slogan")

if(slogan){
slogan.textContent = "Irlanda"
}

},200)

</script>

</body>
</html>
