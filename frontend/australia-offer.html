<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Re(start) - Austrália</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body class="page-enter">
    <div class="background"></div>

    <!-- SIDEBAR COMPONENT -->
    <div id="sidebar"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- NAVBAR COMPONENT -->
    <div id="navbar"></div>

    <div class="country-container">
      <div class="country-help-text">Com o que você pode ajudar?</div>

      <div class="countries">
        <!-- MORADIA -->
        <div class="dev-wrapper">
          <a
            href="features/australia-housing-form.html"
            class="country-card country-large main-card"
          >
            <img src="images/house.png" />
            <p>Moradia</p>
          </a>
        </div>

        <!-- TRABALHO -->
        <div class="dev-wrapper">
          <a
            href="features/australia-jobs-form.html"
            class="country-card country-large main-card"
          >
            <img src="images/job.png" />
            <p>Trabalho</p>
          </a>
        </div>

        <!-- DOCUMENTAÇÃO (AGORA ATIVO) -->
        <div class="dev-wrapper">
          <a
            href="features/australia-docs-form.html"
            class="country-card country-large main-card"
          >
            <img src="images/documents.png" />
            <p>Documentação</p>
          </a>
        </div>

        <!-- MOBILIDADE (AGORA ATIVO) -->
        <div class="dev-wrapper">
          <a
            href="features/australia-mobility-form.html"
            class="country-card country-large main-card"
          >
            <img src="images/mobility.png" />
            <p>Mobilidade</p>
          </a>
        </div>
      </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script src="../js/components.js"></script>

    <script>
      const bg = document.querySelector(".background");

      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 60;
        const y = (window.innerHeight / 2 - e.clientY) / 60;

        bg.style.transform = `scale(1.1) translate(${x}px,${y}px)`;
      });

      async function loadUser() {
        const { data } = await supabase.auth.getUser();

        if (!data.user) {
          window.location.href = "index.html";
          return;
        }

        const name = data.user.user_metadata.name || "Usuário";

        document.getElementById("userName").textContent = name;

        const initial = name.charAt(0).toUpperCase();

        document.getElementById("avatar").textContent = initial;
      }

      loadUser();

      /* slogan */
      setTimeout(() => {
        const slogan = document.querySelector(".home-slogan");

        if (slogan) {
          slogan.textContent = "Austrália / Oferecer ajuda";
        }
      }, 200);
    </script>
  </body>
</html>
