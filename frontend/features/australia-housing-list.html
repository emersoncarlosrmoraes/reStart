<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Visualizar Moradias - Australia</title>

<link rel="stylesheet" href="../../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="page-enter">

<div class="background"></div>

<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div id="navbar">

<div class="navbar-user">
<div id="avatar" class="user-avatar">C</div>
<span id="userName">Carregando...</span>
</div>

</div>

<div class="country-container">

<div class="ireland-cards-wrapper">

<div id="irelandCardsContainer" class="ireland-cards-container"></div>

</div>

</div>


<script src="../../js/supabase.js"></script>
<script src="../../js/components.js"></script>
<script src="../../js/app.js"></script>

<script>

/* BACKGROUND MOVIMENTO */

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})


/* CARREGAR USUÁRIO */

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="../index.html"
return

}

const name=data.user.user_metadata.name||"Usuário"

document.getElementById("userName").textContent=name
document.getElementById("avatar").textContent=name.charAt(0).toUpperCase()

}

loadUser()


/* SLOGAN */

setTimeout(()=>{

const slogan=document.querySelector(".home-slogan")

if(slogan){
slogan.textContent="Australia / Oferecer ajuda / Lista de moradias"
}

},200)



/* =====================
   CARREGAR MORADIAS
===================== */

async function loadAustraliaHousing(){

try{

const { data,error }=await supabase
.from('moradia')
.select('*')
.eq('country','Australia')
.order('created_at',{ascending:false})

if(error) throw error

const container=document.getElementById("irelandCardsContainer")

container.innerHTML=""

if(data.length===0){

container.innerHTML="<p style='color:white'>Nenhuma moradia cadastrada ainda.</p>"
return

}

data.forEach(item=>{

let availableDate=item.available_from?new Date(item.available_from):null

let availableStr=availableDate
?`${("0"+availableDate.getDate()).slice(-2)}/${("0"+(availableDate.getMonth()+1)).slice(-2)}/${availableDate.getFullYear()}`
:"-"

const card=document.createElement("div")

card.className="ireland-card"

card.innerHTML=`

<img src="${item.photo_url || 'https://via.placeholder.com/300x180?text=Sem+Foto'}">

<h3>${item.type} em ${item.city}</h3>

<p><strong>Preço:</strong> $ ${item.price}</p>

<p><strong>Disponível:</strong> ${availableStr}</p>

<p><strong></strong> ${item.contact}</p>

`

container.appendChild(card)

})

}catch(err){

console.error("Erro ao carregar moradias:",err.message)

}

}

loadAustraliaHousing()

</script>

</body>
</html>
