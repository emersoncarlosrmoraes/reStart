<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Vagas de Trabalho - Austrália</title>
    <!-- Chamando o CSS externo -->
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body class="page-enter">
    <div class="background"></div>

    <div id="sidebar"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div id="navbar"></div>

    <div class="country-container">
      <h2>Vagas de Trabalho Publicadas</h2>
      <div class="jobs-list-container">
        <div class="loader-jobs" id="loader">Carregando vagas...</div>
        <table class="jobs-table" id="jobsTable" style="display: none">
          <thead>
            <tr>
              <th>Nome da Vaga</th>
              <th>Tipo de Trabalho</th>
              <th>Cidade</th>
              <th>Pagamento p/ Hora (AUD $)</th>
              <th>A partir de</th>
              <th>Contato</th>
              <th>Descrição</th>
            </tr>
          </thead>
          <tbody id="jobsBody">
            <!-- Linhas serão inseridas via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="../../js/supabase.js"></script>
    <script src="../../js/components.js"></script>

    <script>
      const bg = document.querySelector(".background");
      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 60;
        const y = (window.innerHeight / 2 - e.clientY) / 60;
        bg.style.transform = `scale(1.1) translate(${x}px,${y}px)`;
      });

      async function loadUser() {
        const { data } = await supabase.auth.getUser();
        if (!data.user) {
          window.location.href = "../index.html";
          return;
        }
        const name = data.user.user_metadata.name || "Usuário";
        document.getElementById("userName").textContent = name;
        document.getElementById("avatar").textContent = name
          .charAt(0)
          .toUpperCase();
      }
      loadUser();

      /* slogan */
      setTimeout(() => {
        const slogan = document.querySelector(".home-slogan");
        if (slogan) {
          slogan.textContent = "Austrália / Oferecer ajuda / Vagas publicadas";
        }
      }, 200);

      /* ============================== */
      /* Carregar vagas do Supabase */
      /* ============================== */
      async function loadJobs() {
        const { data, error } = await supabase
          .from("trabalho")
          .select("*")
          .order("available_from", { ascending: true });

        const loader = document.getElementById("loader");
        const table = document.getElementById("jobsTable");
        const tbody = document.getElementById("jobsBody");

        if (error) {
          loader.textContent = "Erro ao carregar vagas: " + error.message;
          return;
        }

        if (data.length === 0) {
          loader.textContent = "Nenhuma vaga cadastrada ainda.";
          return;
        }

        loader.style.display = "none";
        table.style.display = "table";

        data.forEach((job) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${job.job_name}</td>
            <td>${job.type}</td>
            <td>${job.city}</td>
            <td>${job.price}</td>
            <td>${job.available_from}</td>
            <td>${job.contact}</td>
            <td class="job-description-cell">${job.job_description}</td>
          `;
          tbody.appendChild(row);
        });
      }

      loadJobs();
    </script>
  </body>
</html>
