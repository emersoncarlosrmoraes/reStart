<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Irlanda - Moradias Disponíveis</title>

<link rel="stylesheet" href="../../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="page-enter">

<div class="background"></div>

<!-- SIDEBAR COMPONENT -->
<div id="sidebar"></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- NAVBAR COMPONENT -->
<div id="navbar"></div>


<div class="country-container">

<h2>Irlanda — Preciso de Ajuda</h2>

<div class="countries">

<div class="country-card">

<p><b>Quarto disponível</b></p>
<p>Dublin</p>
<p>1 mês gratuito</p>

</div>


<div class="country-card">

<p><b>Sofá disponível</b></p>
<p>Cork</p>
<p>2 semanas</p>

</div>

</div>

</div>


<script src="../../js/supabase.js"></script>
<script src="../../js/components.js"></script>

<script>

/* background movimento */

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})


/* carregar usuário */

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="../index.html"
return

}

const name = data.user.user_metadata.name || "Usuário"

document.getElementById("userName").textContent = name

const initial = name.charAt(0).toUpperCase()

document.getElementById("avatar").textContent = initial

}

loadUser()


/* slogan */

setTimeout(()=>{

const slogan = document.querySelector(".home-slogan")

if(slogan){
slogan.textContent = "Irlanda / Buscar ajuda / Moradias"
}

},200)

</script>

</body>
</html>
