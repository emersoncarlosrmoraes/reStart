<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Auxílio com Documentação</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body class="page-enter">
    <div class="background"></div>

    <div id="sidebar"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div id="navbar"></div>

    <div class="country-container">
      <h2>Auxílio com Documentação</h2>

      <div class="documents-container">
        <!-- TFN -->
        <div class="glass-card">
          <img src="/frontend/images/taxes.png" class="doc-icon" />
          <h3>TFN</h3>
          <p>Necessário para trabalhar legalmente e pagar impostos.</p>
          <button class="doc-btn">Ver ajuda</button>
        </div>

        <!-- Banco -->
        <div class="glass-card">
          <img src="/frontend/images/bank.png" class="doc-icon" />
          <h3>Conta Bancária</h3>
          <p>Abra sua conta para receber salário e movimentar dinheiro.</p>
          <button class="doc-btn">Ver ajuda</button>
        </div>

        <!-- Seguro -->
        <div class="glass-card">
          <img src="/frontend/images/healthcare.png" class="doc-icon" />
          <h3>Seguro Saúde</h3>
          <p>Obrigatório para estudantes e essencial no dia a dia.</p>
          <button class="doc-btn">Ver ajuda</button>
        </div>

        <!-- Visto -->
        <div class="glass-card">
          <img src="/frontend/images/visa.png" class="doc-icon" />
          <h3>Visto</h3>
          <p>Entenda os requisitos e mantenha sua situação regular.</p>
          <button class="doc-btn">Ver ajuda</button>
        </div>
      </div>
    </div>

    <script src="../../js/supabase.js"></script>
    <script src="../../js/components.js"></script>

    <script>
      const bg = document.querySelector(".background");

      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 60;
        const y = (window.innerHeight / 2 - e.clientY) / 60;
        bg.style.transform = `scale(1.1) translate(${x}px,${y}px)`;
      });

      async function loadUser() {
        const { data } = await supabase.auth.getUser();

        if (!data.user) {
          window.location.href = "../index.html";
          return;
        }

        const name = data.user.user_metadata.name || "Usuário";
        document.getElementById("userName").textContent = name;
        document.getElementById("avatar").textContent = name
          .charAt(0)
          .toUpperCase();
      }

      loadUser();

      setTimeout(() => {
        const slogan = document.querySelector(".home-slogan");
        if (slogan) {
          slogan.textContent = "Austrália / Buscar ajuda / Documentação";
        }
      }, 200);
    </script>
  </body>
</html>
