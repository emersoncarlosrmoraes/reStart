<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro de vaga de trabalho</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body class="page-enter">
    <div class="background"></div>

    <div id="sidebar"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div id="navbar"></div>

    <div class="country-container">
      <h2>Cadastro de vaga de trabalho</h2>

      <form id="jobsFormAU" class="form-modern-jobs">
        <!-- GRID PRINCIPAL -->
        <div class="form-grid-jobs">
          <!-- Nome da vaga -->
          <div class="form-field-jobs">
            <label>Nome da vaga</label>
            <input
              type="text"
              id="job_name"
              placeholder="Ex: Eletricista"
              required
            />
          </div>

          <!-- Tipo de trabalho -->
          <div class="form-field-jobs">
            <label>Tipo de Trabalho</label>
            <select id="type" required>
              <option value="">Selecione...</option>
              <option value="Full-Time">Full-Time</option>
              <option value="Part-Time">Part-Time</option>
              <option value="Casual">Casual</option>
            </select>
          </div>

          <!-- Cidade -->
          <div class="form-field-jobs">
            <label>Cidade</label>
            <input type="text" id="city" placeholder="Ex: Brisbane" required />
          </div>

          <!-- Pagamento -->
          <div class="form-field-jobs">
            <label>Pagamento por hora (AUD $)</label>
            <input type="number" id="price" placeholder="Ex: 25" required />
          </div>

          <!-- A partir de -->
          <div class="form-field-jobs">
            <label>A partir de</label>
            <input type="date" id="available_from" required />
          </div>

          <!-- Contato -->
          <div class="form-field-jobs">
            <label>Contato para mais informações</label>
            <input
              type="text"
              id="contact"
              placeholder="Email ou telefone"
              required
            />
          </div>

          <!-- Descrição da vaga -->
          <div class="form-field-jobs full-width-jobs">
            <label>Descrição da vaga</label>
            <textarea
              id="job_description"
              placeholder="Detalhes da vaga"
              rows="8"
              required
            ></textarea>
          </div>
        </div>

        <!-- BOTÃO -->
        <div class="form-actions-jobs">
          <button type="submit" class="btn-submit-jobs">Publicar vaga</button>
        </div>
      </form>
    </div>

    <script src="../../js/supabase.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/app.js"></script>

    <script>
      const bg = document.querySelector(".background");
      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 60;
        const y = (window.innerHeight / 2 - e.clientY) / 60;
        bg.style.transform = `scale(1.1) translate(${x}px,${y}px)`;
      });

      async function loadUser() {
        const { data } = await supabase.auth.getUser();
        if (!data.user) {
          window.location.href = "../index.html";
          return;
        }
        const name = data.user.user_metadata.name || "Usuário";
        document.getElementById("userName").textContent = name;
        document.getElementById("avatar").textContent = name
          .charAt(0)
          .toUpperCase();
      }
      loadUser();

      /* slogan */
      setTimeout(() => {
        const slogan = document.querySelector(".home-slogan");
        if (slogan) {
          slogan.textContent =
            "Austrália / Oferecer ajuda / Cadastrar vaga de trabalho";
        }
      }, 200);

      /* FORMULÁRIO */
      document
        .getElementById("jobsFormAU")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const job_name = document.getElementById("job_name").value;
          const type = document.getElementById("type").value;
          const city = document.getElementById("city").value;
          const price = document.getElementById("price").value;
          const available_from =
            document.getElementById("available_from").value;
          const contact = document.getElementById("contact").value;
          const job_description =
            document.getElementById("job_description").value;

          const { data, error } = await supabase.from("trabalho").insert([
            {
              country: "Australia",
              job_name,
              type,
              city,
              price,
              available_from,
              contact,
              job_description,
            },
          ]);

          if (error) {
            alert("Erro ao cadastrar vaga: " + error.message);
            return;
          }

          alert("Vaga cadastrada com sucesso!");

          const btn = this.querySelector(".btn-submit-jobs");
          btn.style.transform = "scale(0.97)";
          setTimeout(() => (btn.style.transform = "scale(1)"), 150);

          this.reset();
        });
    </script>
  </body>
</html>
