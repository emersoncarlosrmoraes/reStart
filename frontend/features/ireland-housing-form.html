<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Irlanda - Cadastrar Moradia</title>

<link rel="stylesheet" href="../../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="page-enter">

<div class="background"></div>

<!-- SIDEBAR COMPONENT -->
<div id="sidebar"></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- NAVBAR COMPONENT -->
<div id="navbar"></div>


<div class="country-container">

<h2>Irlanda — Quero Ajudar</h2>

<form class="login-box" id="housingFormIE">

<input type="text" id="city" placeholder="Cidade">

<input type="text" id="type" placeholder="Tipo de moradia">

<input type="text" id="duration" placeholder="Tempo disponível">

<button type="submit">Cadastrar</button>

</form>

</div>


<script src="../../js/supabase.js"></script>
<script src="../../js/components.js"></script>
<script src="../../js/app.js"></script>

<script>

/* background movimento */

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})

/* carregar usuário */

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="../index.html"
return

}

const name = data.user.user_metadata.name || "Usuário"

document.getElementById("userName").textContent = name

const initial = name.charAt(0).toUpperCase()

document.getElementById("avatar").textContent = initial

}

loadUser()

/* slogan */

setTimeout(()=>{

const slogan = document.querySelector(".home-slogan")

if(slogan){
slogan.textContent = "Irlanda / Oferecer ajuda / Formulário"
}

},200)

/* formulário */

document.getElementById("housingFormIE").addEventListener("submit", function(e){

e.preventDefault()

const city = document.getElementById("city").value
const type = document.getElementById("type").value
const duration = document.getElementById("duration").value

addHousing("Ireland", city, type, duration)

alert("Moradia cadastrada na Irlanda!")

})

</script>

</body>
</html>
