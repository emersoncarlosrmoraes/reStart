<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Re(start) - Austrália</title>

<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="background"></div>

<nav class="topbar">

<a href="home.html" class="logo">[ reStart ]</a>

<img class="country-flag" src="https://flagcdn.com/w40/au.png">

<div class="country-title">

<div class="country-help-text">
Com o que você precisa de ajuda?
</div>

</div>

<div class="user-area">

<div class="avatar" id="avatar">?</div>

<div class="user-name" id="userName">
Carregando...
</div>

</div>

</nav>

<div class="country-container">

<div class="countries">

<div class="dev-wrapper">

<a href="features/australia-housing-list.html" class="country-card country-large main-card">

<img src="https://cdn-icons-png.flaticon.com/512/619/619034.png">

<p>Moradia</p>

</a>

</div>

<div class="dev-wrapper">

<div class="country-card country-large dev-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<p>Trabalho</p>

</div>

<div class="dev-label">
Em desenvolvimento
</div>

</div>

<div class="dev-wrapper">

<div class="country-card country-large dev-card">

<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

<p>Documentação</p>

</div>

<div class="dev-label">
Em desenvolvimento
</div>

</div>

<div class="dev-wrapper">

<div class="country-card country-large dev-card">

<img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">

<p>Mobilidade</p>

</div>

<div class="dev-label">
Em desenvolvimento
</div>

</div>

</div>

</div>

<div class="logout-button" id="logoutBtn">
Log out
</div>

<script src="../js/supabase.js"></script>

<script>

const bg = document.querySelector(".background")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/60
const y=(window.innerHeight/2-e.clientY)/60

bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`

})

async function loadUser(){

const { data } = await supabase.auth.getUser()

if(!data.user){

window.location.href="index.html"
return

}

const name = data.user.user_metadata.name || "Usuário"

document.getElementById("userName").textContent = name

const initial = name.charAt(0).toUpperCase()

document.getElementById("avatar").textContent = initial

}

loadUser()

document.getElementById("logoutBtn").addEventListener("click",async()=>{

await supabase.auth.signOut()

window.location.href="index.html"

})

</script>

</body>
</html>
